set-environment -g PATH "/opt/homebrew/bin:/bin:/usr/bin"

# =============================================================================
# SETTINGS
# =============================================================================
set -s escape-time 0
set-option -g default-shell ${SHELL}
set-option -g default-command "zsh"

# Set window and pane index to 1
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Vi is good
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi Escape send-keys -X cancel
bind-key -T copy-mode-vi v send-keys -X begin-selection
# Yank to system clipboard (macOS)
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
# Copy on mouse drag without exiting copy mode
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe "pbcopy"

# Enable mouse mode
set -g mouse on

# Sync terminal tab title with the active tmux session name
set -g set-titles on
set -g set-titles-string '#S'

# When a session is killed, switch to another existing session instead of detaching.
set -g detach-on-destroy off

# =============================================================================
# THEME
# =============================================================================
# Pane borders — heavy lines, active pane highlighted, title shown at top
set -g pane-border-style 'fg=colour236'
set -g pane-active-border-style 'fg=colour250,bold'
set -g pane-border-lines heavy
set -g pane-border-status top
set -g pane-border-format '#{?pane_active,#{?pane_title,#[align=right]  #{pane_title}  ,#[fg=colour250,bold]*}, }'

# tmux-256color gives better italics and true color support in Neovim
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set-option -sa terminal-overrides ",alacritty:RGB"

set-window-option -g status-left " #S "
set -g status-left-length 100

# Overwritten by tokyo-night-tmux
set-window-option -g status-right " %H:%M %d-%b-%y #{tmux_mode_indicator}"
set-window-option -g window-status-format " #I: #W "
set-window-option -g window-status-current-format " #I: #W "

# =============================================================================
# KEYBINDINGS
# =============================================================================
# Remap prefix from "C-b" to "C-space"
set-option -g prefix C-Space
unbind C-Space
bind C-Space send-prefix

# Reload config file (change file location to your the tmux.conf you want to use)
bind r source-file $HOME/.config/tmux/tmux.conf \; display-message " Reloading /.config/tmux/tmux.conf"

# Use vim-like keys for splits and windows
bind-key v split-window -h -c "#{pane_current_path}"
bind-key s split-window -v -c "#{pane_current_path}"
# Override default split keys to also inherit cwd
bind-key % split-window -h -c "#{pane_current_path}"
bind-key '"' split-window -v -c "#{pane_current_path}"
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

bind-key C-o rotate-window

# Toggle between current and last session
bind-key Tab switch-client -l

# Navigate windows like Vim buffers
bind [ previous-window
bind ] next-window

# Swap windows left/right
bind -r < swap-window -d -t -1
bind -r > swap-window -d -t +1

# Repeatable resize with uppercase HJKL — lowercase moves, uppercase resizes
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Confirm before killing — x=pane, X=session, W=window
bind-key x confirm-before -p "Kill pane #P? (y/n)" "kill-pane"
bind-key X confirm-before -p "Kill session #S? (y/n)" "kill-session"
bind-key W confirm-before -p "Kill window #W? (y/n)" "kill-window"

# Scratch terminal opens in the current pane's directory
bind-key q display-popup -w 70% -h 50% -E -d "#{pane_current_path}" "$SHELL"

# =============================================================================
# PLUGINS
# =============================================================================
set -g @plugin "tmux-plugins/tpm"
set -g @plugin "tmux-plugins/tmux-sensible"
set -g @plugin "tmux-plugins/tmux-resurrect"
set -g @plugin "tmux-plugins/tmux-continuum"
set -g @plugin "janoamaral/tokyo-night-tmux"
set -g @plugin "tmux-plugins/tmux-prefix-highlight"
set -g @plugin "christoomey/vim-tmux-navigator"
set -g @plugin "rickstaa/tmux-notify"
# fzf-powered session and window switcher
set -g @plugin "omerxx/tmux-sessionx"
# Continuum + Resurrect behavior
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'
# tmux-notify behavior
set -g @tnotify-verbose 'on'
# tmux-prefix-highlight — styled to match tokyo-night-tmux
set -g @prefix_highlight_fg '#1a1b26'
set -g @prefix_highlight_bg '#41a6b5'
set -g @prefix_highlight_show_copy_mode 'on'
set -g @prefix_highlight_copy_mode_attr 'fg=#1a1b26,bg=#e0af68'
set -g @prefix_highlight_prefix_prompt 'PREFIX'
set -g @prefix_highlight_copy_prompt 'COPY'

run "$HOME/.config/tmux/plugins/tpm/tpm"
